name: mg-location-simulation

services:
  postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: mg-location-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mg_location
      POSTGRES_USER: mg_location_user
      POSTGRES_PASSWORD: mg_location_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mg_location_user -d mg_location"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - mg-location-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mg-location-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-troque-isto}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-mg_location}
      DB_USER: ${DB_USER:-mg_location_user}
      DB_PASSWORD: ${DB_PASSWORD:-mg_location_password}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:8000/}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 5); s.close()\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    networks:
      - mg-location-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    container_name: simulador-mg-location
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-8088}:8000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - mg-location-network

volumes:
  postgres_data:

networks:
  mg-location-network:
    driver: bridge
