name: sos-location-simulation

services:
  postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: sos-location-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sos_location
      POSTGRES_USER: sos_location_user
      POSTGRES_PASSWORD: sos_location_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - effective_cache_size=1GB
      - -c
      - idle_in_transaction_session_timeout=60000
      - -c
      - statement_timeout=120000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sos_location_user -d sos_location"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - sos-location-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sos-location-sso-keycloak
    restart: unless-stopped
    command:
      [
        "start-dev",
        "--import-realm",
        "--https-certificate-file=/opt/keycloak/data/certs/server.crt.pem",
        "--https-certificate-key-file=/opt/keycloak/data/certs/server.key.pem",
      ]
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_HTTPS_PORT: 8443
      # KC_HOSTNAME: localhost
      # KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./infra/keycloak/theme/sos-theme:/opt/keycloak/themes/sos-theme:ro
      - ./infra/certs:/opt/keycloak/data/certs:ro
    ports:
      - "${KEYCLOAK_PORT:-8080}:8443"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8443"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - sos-location-network

  backend:
    build:
      context: ./backend-dotnet
      dockerfile: Dockerfile
    container_name: sos-location-api-backend-net
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8001;http://+:8000
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/certs/server.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=dev-password
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=sos_location;Username=sos_location_user;Password=sos_location_password
      - Keycloak__Authority=https://keycloak:8443/realms/sos-location
      - Keycloak__Audience=sos-location-frontend
      - Keycloak__RequireHttpsMetadata=false
      - ExternalIntegrations__InmetUrl=${INMET_URL:-https://apiprevmet3.inmet.gov.br/avisos/ativos}
      - ExternalIntegrations__OpenTopographyUrl=${OPENTOPOGRAPHY_URL:-https://portal.opentopography.org/API/globaldem}
      - ExternalIntegrations__OverpassUrl=${OVERPASS_URL:-https://overpass-api.de/api/interpreter}
    volumes:
      - ./infra/certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
    ports:
      - "${BACKEND_PORT:-8001}:8001"
      - "8000:8000"
    networks:
      - sos-location-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile.dev
    container_name: sos-location-web-frontend
    working_dir: /app
    volumes:
      - ./frontend-react:/app
    # CMD gerido pelo Dockerfile.dev para evitar freeze do bun install no boot
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_DEV_API_TARGET: http://backend:8000
      VITE_DEV_GIS_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8088}:8000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ls /app/package.json || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - sos-location-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: sos-location-logs-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_LEVEL: ${DOZZLE_LEVEL:-info}
      DOZZLE_TAILSIZE: ${DOZZLE_TAILSIZE:-300}
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - sos-location-network

  risk-analysis:
    build:
      context: ./risk-analysis-unit
      dockerfile: Dockerfile
    container_name: sos-location-ml-risk-unit
    restart: unless-stopped
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./risk_model_parameters.json:/app/model_parameters.json:ro
      - ./risk_training_data.csv:/app/training_data.csv:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8090:8000"
    networks:
      - sos-location-network

  db-backup:
    build:
      context: ./infra/db-backup
    container_name: sos-location-db-backup
    restart: unless-stopped
    environment:
      - PGPASSWORD=sos_location_password
    volumes:
      - ./infra/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sos-location-network

volumes:
  postgres_data:

networks:
  sos-location-network:
    driver: bridge
