name: mg-location-simulation

services:
  postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: mg-location-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mg_location
      POSTGRES_USER: mg_location_user
      POSTGRES_PASSWORD: mg_location_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - effective_cache_size=1GB
      - -c
      - idle_in_transaction_session_timeout=60000
      - -c
      - statement_timeout=120000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mg_location_user -d mg_location"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - mg-location-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mg-location-api-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-troque-isto}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-False}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-mg_location}
      DB_USER: ${DB_USER:-mg_location_user}
      DB_PASSWORD: ${DB_PASSWORD:-mg_location_password}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:8000/}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      MIGRATE_MAX_ATTEMPTS: ${MIGRATE_MAX_ATTEMPTS:-24}
      RISK_AGENT_URL: ${RISK_AGENT_URL:-http://risk-agent:8091}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 5); s.close()\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    networks:
      - mg-location-network

  risk-agent:
    build:
      context: ./risk_agent
      dockerfile: Dockerfile
    container_name: mg-location-ml-risk-agent
    restart: unless-stopped
    environment:
      ALPHAGEO_API_URL: ${ALPHAGEO_API_URL:-}
      OGC_API_URL: ${OGC_API_URL:-https://demo.pygeoapi.io/master/collections/obs/items}
      NGFS_GUIDE_URL: ${NGFS_GUIDE_URL:-}
    ports:
      - "${RISK_AGENT_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - mg-location-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    container_name: mg-location-web-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-8088}:8000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - mg-location-network

volumes:
  postgres_data:

networks:
  mg-location-network:
    driver: bridge
