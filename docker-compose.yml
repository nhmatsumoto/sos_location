name: sos-location

services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sos_location}
      POSTGRES_USER: ${POSTGRES_USER:-sos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sos_dev_password}
    volumes:
      # PostgreSQL 18+: montar em /var/lib/postgresql (dados ficam em subdiretório versionado).
      - postgres-data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sos} -d ${POSTGRES_DB:-sos_location}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [sos]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sos-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sos_minio_dev_password}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [sos]

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      network: host
    # DNS explícito: hosts com systemd-resolved (127.0.0.53) quebram a resolução
    # externa na rede bridge; Nominatim/Overpass precisam resolver em runtime.
    dns: [1.1.1.1, 8.8.8.8]
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sos_location};Username=${POSTGRES_USER:-sos};Password=${POSTGRES_PASSWORD:-sos_dev_password}"
      ObjectStorage__Endpoint: "minio:9000"
      ObjectStorage__AccessKey: ${MINIO_ROOT_USER:-sos-minio}
      ObjectStorage__SecretKey: ${MINIO_ROOT_PASSWORD:-sos_minio_dev_password}
      ObjectStorage__Bucket: ${MINIO_BUCKET:-sos-location}
      Fixture__Path: /app/tools/fixtures/demo-district.geojson
      Cors__AllowedOrigins__0: http://localhost:8080
      Cors__AllowedOrigins__1: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_PORT:-5080}:8080"
    networks: [sos]

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
      network: host
    dns: [1.1.1.1, 8.8.8.8]
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sos_location};Username=${POSTGRES_USER:-sos};Password=${POSTGRES_PASSWORD:-sos_dev_password}"
      ObjectStorage__Endpoint: "minio:9000"
      ObjectStorage__AccessKey: ${MINIO_ROOT_USER:-sos-minio}
      ObjectStorage__SecretKey: ${MINIO_ROOT_PASSWORD:-sos_minio_dev_password}
      ObjectStorage__Bucket: ${MINIO_BUCKET:-sos-location}
      Fixture__Path: /app/tools/fixtures/demo-district.geojson
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [sos]

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      network: host
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:80"
    networks: [sos]

volumes:
  postgres-data:
  minio-data:

networks:
  sos:
    driver: bridge
