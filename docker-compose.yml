name: mg-location-simulation

services:
  postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: mg-location-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mg_location
      POSTGRES_USER: mg_location_user
      POSTGRES_PASSWORD: mg_location_password
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - effective_cache_size=1GB
      - -c
      - idle_in_transaction_session_timeout=60000
      - -c
      - statement_timeout=120000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mg_location_user -d mg_location"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - mg-location-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mg-location-sso-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - mg-location-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mg-location-api-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-troque-isto}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-True}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-mg_location}
      DB_USER: ${DB_USER:-mg_location_user}
      DB_PASSWORD: ${DB_PASSWORD:-mg_location_password}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:8000/}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      MIGRATE_MAX_ATTEMPTS: ${MIGRATE_MAX_ATTEMPTS:-24}
      RISK_AGENT_URL: ${RISK_AGENT_URL:-http://risk-agent:8091}
      RISK_AGENT_INTERNAL_TOKEN: ${RISK_AGENT_INTERNAL_TOKEN:-mg-location-internal-token}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-true}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sos-location}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sos-location-frontend}
      KEYCLOAK_VERIFY_AUDIENCE: ${KEYCLOAK_VERIFY_AUDIENCE:-true}
      KEYCLOAK_ROLE_ADMIN: ${KEYCLOAK_ROLE_ADMIN:-mg_admin}
      KEYCLOAK_ROLE_OPERATOR: ${KEYCLOAK_ROLE_OPERATOR:-mg_operator}
      KEYCLOAK_ROLE_VIEWER: ${KEYCLOAK_ROLE_VIEWER:-mg_viewer}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      RUN_INTEGRATIONS_ON_STARTUP: ${RUN_INTEGRATIONS_ON_STARTUP:-true}
      SECURE_SSL_REDIRECT: "False"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import socket; s=socket.create_connection((''127.0.0.1'', 8000), 5); s.close()"',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    networks:
      - mg-location-network

  risk-agent:
    build:
      context: .
      dockerfile: risk_agent/Dockerfile
    container_name: mg-location-ml-risk-agent
    volumes:
      - ./risk_agent:/app
    restart: unless-stopped
    environment:
      ALPHAGEO_API_URL: ${ALPHAGEO_API_URL:-}
      OGC_API_URL: ${OGC_API_URL:-https://demo.pygeoapi.io/master/collections/obs/items}
      NGFS_GUIDE_URL: ${NGFS_GUIDE_URL:-}
      RISK_AGENT_INTERNAL_TOKEN: ${RISK_AGENT_INTERNAL_TOKEN:-mg-location-internal-token}
    expose:
      - "8091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8091/health'', timeout=5)"',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - mg-location-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    container_name: mg-location-web-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-8088}:8000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000'', timeout=5)"',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - mg-location-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: sos-location-logs-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_LEVEL: ${DOZZLE_LEVEL:-info}
      DOZZLE_TAILSIZE: ${DOZZLE_TAILSIZE:-300}
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - mg-location-network

volumes:
  postgres_data:

networks:
  mg-location-network:
    driver: bridge
