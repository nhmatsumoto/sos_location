# Cache de vector tiles: revisões são imutáveis, então o cache pode ser
# agressivo e nunca precisa de invalidação (chave inclui o revisionId).
proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tiles:16m
                 max_size=1g inactive=30d use_temp_path=off;

server {
    listen ${WEB_LISTEN_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/json application/javascript text/css application/vnd.mapbox-vector-tile;
    gzip_min_length 1024;

    # Resolver interno do Docker: re-resolve "api" quando o container é recriado.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream ${API_UPSTREAM};

    # Tiles vetoriais e de relevo com cache de borda (Vary: Accept-Encoding).
    location ~ ^/api/v1/(tiles|terrain)/ {
        proxy_cache tiles;
        proxy_cache_valid 200 204 304 30d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Tile-Cache $upstream_cache_status;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Demais rotas da API (o navegador nunca fala com provedores GIS).
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass $api_upstream$request_uri;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
