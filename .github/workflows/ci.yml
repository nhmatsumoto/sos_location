name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build SosLocation.slnx --nologo
      - name: Unit tests
        run: dotnet test tests/SosLocation.UnitTests --no-build --nologo
      - name: Architecture tests
        run: dotnet test tests/SosLocation.ArchitectureTests --no-build --nologo
      - name: Integration tests (PostGIS via Testcontainers)
        run: dotnet test tests/SosLocation.IntegrationTests --no-build --nologo

  web:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Unit tests
        run: npx vitest run
      - name: Production build
        run: npm run build
